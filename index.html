<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9 AI Tools 2026 - Free AI Tools</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

<!-- HOME PAGE -->
<div id="homePage">
    <div class="p-8 text-center">
        <h1 class="text-4xl font-bold">9 AI Tools 2026</h1>
        <p class="mt-2">Free AI tools for everyone</p>

        <div class="mt-10 grid grid-cols-2 gap-4">
            <button onclick="showPage('proposalAuditor')" class="bg-purple-600 p-4 rounded">Proposal Tool</button>
            <button onclick="showPage('linkedinIceBreaker')" class="bg-purple-600 p-4 rounded">LinkedIn Tool</button>
        </div>
    </div>
</div>

<!-- TOOL PAGE -->
<div id="proposalAuditor" class="hidden p-8">
    <button onclick="showPage('homePage')">Back</button>
    <h2 class="text-2xl">Tool Working ✅</h2>
</div>

<!-- GDPR BANNER -->
<div id="cookieBanner" style="display:none; position:fixed; bottom:0; width:100%; background:#111; padding:15px; text-align:center;">
    <p>This site uses cookies</p>
    <button onclick="acceptCookies()">Accept</button>
    <button onclick="declineCookies()">Decline</button>
</div>

<!-- DEDICATION (FIXED) -->
<div class="w-full bg-purple-700 text-center py-4 px-4">
    <p class="max-w-3xl mx-auto text-sm">Every line of code is written with love ❤️</p>
</div>

<script>

// PAGE SWITCH
function showPage(pageId) {
    document.getElementById('homePage').classList.add('hidden');
    document.getElementById('proposalAuditor').classList.add('hidden');
    document.getElementById(pageId).classList.remove('hidden');

    // POPUNDER TRIGGER (ONLY ONCE)
    if (!window.popunderShown && pageId !== 'homePage') {
        window.popunderShown = true;
        var s = document.createElement("script");
        s.src = "https://pl28962723.profitablecpmratenetwork.com/47/33/6f/47336fdfa845a907abc52ab763bd3e05.js";
        document.body.appendChild(s);
    }
}

// GDPR
function checkCookieConsent() {
    if (!localStorage.getItem('cookieConsent')) {
        document.getElementById('cookieBanner').style.display = 'block';
    }
}

function acceptCookies() {
    localStorage.setItem('cookieConsent','yes');
    document.getElementById('cookieBanner').style.display='none';
}

function declineCookies() {
    localStorage.setItem('cookieConsent','no');
    document.getElementById('cookieBanner').style.display='none';
}

window.addEventListener('load', checkCookieConsent);

</script>

</body>
</html>
